    <main>
        <h2>Contact Me</h2>
        <div></div>
            <img class="contact-image" src="images/oldDaniel.jpg" alt="Contact Image">
        </div>
        <p>Feel free to reach out to me using the form below:</p>

        <form id="contactForm">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" placeholder="Write your name" required>
            <row>
                <div>

            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="Write your email" required>
                </div>

                <div>

            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Write your message here" required></textarea>

                </div>
            </row>
            <button id="submitBtn">submit</button>

       
       
            
        </form>
    </main>
    <footer>
        <p>© 2026 Daniel Portfolio</p>
    </footer>
